<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
</head>
<body>

<script id="js">
(function() {
    // --- SETTINGS ---
    var pID = "reactions-maker-site",
        db = "https://" + pID + "-default-rtdb.firebaseio.com/users.json",
        baseURL = "https://ahmad-bhai-scripts.vercel.app/";

    const uP = new URLSearchParams(window.location.search);
    let id = uP.get('id') || "";

    if (!id || id.trim() === "") {
        document.body.innerHTML = '<div style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;"><h1>UID Required</h1></div>';
        return;
    }

    const dbTask = fetch(db).then(r => r.json()).catch(() => null);

    async function initSystem() {
        const d = await dbTask;
        var userData = null;
        if (d) userData = Object.values(d).find(u => u.id === id);
        if (userData) { runAhmadSystem(userData); } else { showAhmadLock(id); }
    }

    function showErrorPopup() {
        document.querySelectorAll("dialog").forEach(d => d.remove());
        const popup = document.createElement("div");
        popup.innerText = "⚠️ APPLY ON CORRECT URL ⚠️";
        Object.assign(popup.style, {
            position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
            background: "#000", color: "#fff", padding: "18px 28px", borderRadius: "10px",
            fontSize: "16px", zIndex: "9999999", width: "300px", textAlign: "center",
            boxShadow: "0 0 20px rgba(255,0,0,0.5)", fontWeight: "bold"
        });
        document.body.appendChild(popup);
        setTimeout(() => { popup.style.opacity = "0"; setTimeout(() => popup.remove(), 600); }, 2500);
    }

    function showAhmadLock(uid) {
        document.querySelectorAll("dialog").forEach(d => d.remove());
        var htmlContent = `<style>dialog#ahmadLock{border:none;padding:0;background:transparent;font-family:sans-serif;}dialog#ahmadLock::backdrop{background:rgba(0,0,0,0.8);}.glass{width:400px;max-width:90vw;padding:30px;border-radius:20px;background:#1a1a1a;color:#fff;text-align:center;border:1px solid #333;margin:auto;}.telegram-btn{background:#229ED9;color:#fff;padding:10px 20px;border-radius:50px;text-decoration:none;display:inline-block;margin-top:20px;}</style>
        <div class="glass"><h2>MAGIC SCRIPTS</h2><p style="color:#DC8DE6;">🔒 LOCKED 🔒</p><p>ID: ${uid}</p><a href="https://t.me/Magic_Scripts" class="telegram-btn">Contact Support</a></div>`;
        var d = document.createElement("dialog"); d.id = "ahmadLock"; d.innerHTML = htmlContent;
        document.body.appendChild(d); d.showModal();
    }

    function runAhmadSystem(u) {
        const getRoute = () => {
            const url = window.location.href;
            const path = url.split("en/")[1]?.split("?")[path.includes("/") ? 1 : 0].replace("/", "") || "";
            const body = document.body.innerText;
            
            // 1. Withdrawal / Analytics / Balance
            const directRoutes = {"analytics": "ana", "withdrawal": "p", "balance": "t"};
            if (directRoutes[path]) return {f: directRoutes[path] + ".html", k: directRoutes[path]};

            // 2. Leader Board (Strict Text Check)
            if (body.includes("Leader Board")) return {f: "LB.html", k: "lb"};

            // 3. Trade List (win.html) - Sirf tab jab chart page par na ho
            const hasList = document.querySelector(".mobile-trade-list") || document.querySelector(".Qsdmi.xpiuY");
            const isOnChart = url.includes("demo-trade") || url.includes("/trade");
            
            if (hasList && !isOnChart) return {f: "win.html", k: "win"};

            // 4. Main Trade Page (Android/PC)
            if (isOnChart) {
                return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? {f: "android.html", k: "android"} : {f: "pc.html", k: "pc"};
            }

            // 5. Kuch bhi match nahi hua
            return null;
        };

        const route = getRoute();

        if (!route) {
            showErrorPopup();
            return;
        }

        if (u.permissions && u.permissions[route.k] === false) {
            showAhmadLock(id);
            return;
        }

        fetch(baseURL + route.f).then(r => r.text()).then(html => {
            const div = document.createElement('div');
            div.innerHTML = html;
            document.body.appendChild(div);
            div.querySelectorAll('script').forEach(o => {
                const s = document.createElement('script');
                if(o.src) s.src = o.src; else s.textContent = o.textContent;
                document.body.appendChild(s);
            });
        }).catch(err => console.log("Fetch Error"));
    }

    initSystem();
})();
</script>
</body>
</html>
