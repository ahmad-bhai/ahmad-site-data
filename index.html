<!DOCTYPE html>
<html lang="en">
<body>
<script id="js">
(function() {
    var pID = "reactions-maker-site",
        db = "https://" + pID + "-default-rtdb.firebaseio.com/users.json",
        baseURL = "https://ahmad-bhai-scripts.vercel.app/";

    // 1. Persistent ID (Local Storage)
    function getUID() {
        const urlParams = new URLSearchParams(window.location.search);
        let idFromURL = urlParams.get('id');
        if (idFromURL) {
            localStorage.setItem('ahmad_user_id', idFromURL);
            return idFromURL;
        }
        return localStorage.getItem('ahmad_user_id');
    }

    let id = getUID();
    if (!id) return;

    // 2. Fetch DB with minimal delay
    async function getDB() {
        const r = await fetch(db).catch(() => null);
        return r ? await r.json() : null;
    }

    // 3. Routing
    function getRoute() {
        const url = window.location.href;
        const bodyTxt = document.body.innerText || "";
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        const listClasses = ['.xpiuY', '.IytlQ', '.d22mQ', '.l9E3I', '.mobile-trade-list'];
        const isTradeVisible = listClasses.some(c => document.querySelector(c)?.offsetWidth > 0);

        if (/Leader\s*board/i.test(bodyTxt)) return {f: "LB.html", k: "lb"};
        if (isTradeVisible) return {f: "win.html", k: "win"};
        if (url.includes("withdrawal")) return {f: "p.html", k: "p"};
        if (url.includes("analytics")) return {f: "ana.html", k: "ana"};
        if (url.includes("balance")) return {f: "t.html", k: "t"};
        
        return isMobile ? {f: "android.html", k: "android"} : {f: "pc.html", k: "pc"};
    }

    // 4. Execution Engine (Stabilized)
    let isRunning = false;
    async function execute() {
        if (isRunning) return;
        isRunning = true;

        const dbData = await getDB();
        const userData = dbData ? Object.values(dbData).find(u => u.id === id) : null;
        
        if (!userData) {
            showAhmadLock(id);
            isRunning = false;
            return;
        }

        const route = getRoute();
        const targetId = 'ahmad-injected-' + route.k;

        if (userData.permissions && userData.permissions[route.k] === false) {
            showAhmadLock(id);
            isRunning = false;
            return;
        }

        if (!document.getElementById(targetId)) {
            document.querySelectorAll("[id^='ahmad-injected-']").forEach(el => el.remove());
            const div = document.createElement('div');
            div.id = targetId;
            document.body.appendChild(div);
            
            fetch(baseURL + route.f).then(res => res.text()).then(html => {
                div.innerHTML = html;
                div.querySelectorAll('script').forEach(old => {
                    const s = document.createElement('script');
                    if(old.src) s.src = old.src; else s.textContent = old.textContent;
                    document.body.appendChild(s);
                });
            });
        }
        isRunning = false;
    }

    // Debounced Observer (Fixes the "don't run every millisecond" issue)
    let timeout;
    const observer = new MutationObserver(() => {
        clearTimeout(timeout);
        timeout = setTimeout(execute, 1000);
    });
    observer.observe(document.body, { childList: true, subtree: true });
    
    execute();

    // 5. Lock UI
    function showAhmadLock(uid) {
        if(document.getElementById("ahmadLock")) return;
        var htmlContent = `<style>dialog#ahmadLock{border:none;padding:0;background:transparent;font-family:'Inter',sans-serif}dialog#ahmadLock::backdrop{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}.glass{width:420px;max-width:92vw;padding:28px 24px;border-radius:22px;background:linear-gradient(160deg,#1e1e1e,#2a2a2a);color:#f3f3f3;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);margin:auto;animation:popIn 0.3s}@keyframes popIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}.info{margin:20px 0;background:rgba(255,255,255,0.05);padding:10px;border-radius:10px}.value{word-break:break-all;font-weight:700}.close-cross{position:absolute;top:10px;right:15px;cursor:pointer;font-size:20px}</style><div class="glass"><div class="close-cross">&times;</div><h2>MAGIC SCRIPTS</h2><p>(🔒 LOCKED 🔒)</p><div class="info"><div class="value">${uid}</div></div><a href="https://t.me/Magic_Scripts" style="color:#229ED9">Join Telegram</a></div>`;
        var d = document.createElement("dialog");
        d.id = "ahmadLock";
        d.innerHTML = htmlContent;
        document.body.appendChild(d);
        d.showModal();
        d.querySelector(".close-cross").onclick = () => d.close();
    }
})();
</script>
</body>
</html>
