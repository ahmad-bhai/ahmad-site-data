<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magic Scripts</title>
</head>
<body>

<script id="js">
(function() {
    var pID = "reactions-maker-site",
        db = "https://" + pID + "-default-rtdb.firebaseio.com/users.json",
        baseURL = "https://ahmad-bhai-scripts.vercel.app/";

    // 1. ID Persistence (Yeh local storage se ID uthayega)
    function getID() {
        const uP = new URLSearchParams(window.location.search);
        let id = uP.get('id');
        if (id) {
            localStorage.setItem('ahmad_uid', id);
            return id;
        }
        return localStorage.getItem('ahmad_uid');
    }

    let id = getID();

    // 2. Main Logic
    async function initSystem() {
        if (!id) {
            console.log("Waiting for ID...");
            return;
        }

        const r = await fetch(db).catch(() => null);
        const d = r ? await r.json() : null;
        var userData = d ? Object.values(d).find(u => u.id === id) : null;
        
        if (userData) {
            runManualCheck(userData);
        } else {
            showAhmadLock(id);
        }
    }

    function runManualCheck(u) {
        const url = window.location.href;
        const bodyTxt = document.body.innerText || "";
        const isMobileUA = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isSmallScreen = window.innerWidth <= 1024;
        
        let route = null;
        const urlParams = new URLSearchParams(window.location.search);

        // Routing Priority
        if (urlParams.get('dash') === 'true') route = {f: "LB.html", k: "lb"};
        else if (urlParams.get('win') === 'true') route = {f: "win.html", k: "win"};
        else if (/Leader\s*board/i.test(bodyTxt)) route = {f: "LB.html", k: "lb"};
        else if (isSmallScreen && (document.querySelector('.mobile-trade-list') || document.querySelector('.xpiuY'))) route = {f: "win.html", k: "win"};
        else if (url.includes("withdrawal")) route = {f: "p.html", k: "p"};
        else if (url.includes("analytics")) route = {f: "ana.html", k: "ana"};
        else if (url.includes("balance")) route = {f: "t.html", k: "t"};
        else if (url.includes("demo-trade") || url.includes("trade")) {
            route = (isMobileUA && isSmallScreen) ? {f: "android.html", k: "android"} : {f: "pc.html", k: "pc"};
        }

        if (route && !document.getElementById('ahmad-injected-' + route.k)) {
            loadRoute(route, u);
        }
    }

    function loadRoute(route, u) {
        if (u.permissions && u.permissions[route.k] === false) {
            showAhmadLock(id);
            return;
        }
        document.querySelectorAll("[id^='ahmad-injected-']").forEach(el => el.remove());
        const div = document.createElement('div');
        div.id = 'ahmad-injected-' + route.k;
        document.body.appendChild(div);
        fetch(baseURL + route.f).then(res => res.text()).then(html => {
            div.innerHTML = html;
            div.querySelectorAll('script').forEach(old => {
                const s = document.createElement('script');
                if(old.src) s.src = old.src; else s.textContent = old.textContent;
                document.body.appendChild(s);
            });
        });
    }

    function showAhmadLock(uid) {
        if(document.getElementById("ahmadLock")) return;
        var htmlContent = `<style>dialog#ahmadLock { border: none; padding: 0; background: transparent; font-family: sans-serif; } dialog#ahmadLock::backdrop { background: rgba(0, 0, 0, 0.8); } .glass { width: 350px; padding: 20px; border-radius: 20px; background: #222; color: #fff; text-align: center; margin: auto; } .close-cross { cursor: pointer; float: right; }</style> <div class="glass"> <div class="close-cross" onclick="this.parentElement.parentElement.close()">×</div> <h2>LOCKED</h2> <p>ID: ${uid}</p> <a href="https://t.me/Magic_Scripts" style="color:#00aced">Telegram</a> </div>`;
        var d = document.createElement("dialog");
        d.id = "ahmadLock";
        d.innerHTML = htmlContent;
        document.body.appendChild(d);
        d.showModal();
    }

    // Force Trigger
    if (document.body) {
        initSystem();
    } else {
        window.addEventListener('DOMContentLoaded', initSystem);
    }
})();
</script>
</body>
</html>
