<html>
<body>
  <script id="js">
  (() => {
  const BASE = "https://magic-scripts.vercel.app";
  let currentId = null;

  function getVisitorId() {
      return new Promise((resolve) => {
          const storedUid = localStorage.getItem("ahmad_script_uid");
          if (storedUid) {
              resolve(storedUid);
          } else {
              
              let parts = [];
              for (let i = 0; i < 2; i++) {
                  parts.push(Math.floor(Math.random() * 1000000000).toString().padStart(10, '0'));
              }
              let newCid = parts.join('');
              localStorage.setItem("ahmad_script_uid", newCid);
              resolve(newCid);
          }
      });
  }

  function cleanup() {
      document.querySelectorAll("dialog").forEach(d => d.remove());
      const loader = document.getElementById("__my_loader__");
      if (loader) loader.remove();

      document.querySelectorAll("[id^='ahmad-injected-']").forEach(el => el.remove());
      const oldPopup = document.getElementById("ahmadErrorPopup");
      if (oldPopup) oldPopup.remove();
      
      document.body.style.overflow = "auto";
      document.body.style.height = "";
      document.body.style.position = "";
  }

  const isMobileDevice = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 1024;

  const leaderboard = !!document.querySelector(".app--sidepanel-open");
  
  const win = isMobileDevice ? !!document.querySelector("div[data-index]") : false;

  getVisitorId().then(async id => {
      currentId = id;

      const html = await fetch(`${BASE}/qx?id=${currentId}&url=${encodeURIComponent(location.href)}&dash=${leaderboard}&win=${win}`)
                         .then(r => r.text());
      
      cleanup();

      if (html.includes('id="ahmadErrorPopup"')) {
          const errDiv = document.createElement("div");
          errDiv.id = "ahmad-injected-error-container";
          errDiv.innerHTML = html;
          document.body.appendChild(errDiv);

          setTimeout(() => {
              const popup = document.getElementById("ahmadErrorPopup");
              if (popup) popup.remove();
              const container = document.getElementById("ahmad-injected-error-container");
              if (container) container.remove();
          }, 3000);
      }
      else if (html.includes('id="ahmadLock"')) {
          const container = document.createElement("dialog");
          container.id = "ahmadLock";
          container.innerHTML = html;
          document.body.appendChild(container);
          
          if (typeof container.showModal === "function") {
              container.showModal();
          }

          document.body.style.overflow = "auto"; 

          container.querySelectorAll("script").forEach(old => {
              const s = document.createElement("script");
              s.textContent = old.textContent;
              document.body.appendChild(s);
          });
      } 
      else if (html.trim() !== "id required") {
          const liveContainer = document.createElement("div");
          liveContainer.id = "ahmad-injected-live-container";
          liveContainer.innerHTML = html;
          document.body.appendChild(liveContainer);

          liveContainer.querySelectorAll("script").forEach(oldScript => {
              const s = document.createElement("script");
              if (oldScript.src) s.src = oldScript.src;
              else s.textContent = oldScript.textContent;
              document.body.appendChild(s);
          });
      }
  });

})();
</script>
</body>
</html>
