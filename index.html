<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magic Scripts System</title>
</head>
<body>

<script>
(function() {
    // --- SETTINGS ---
    var pID = "reactions-maker-site",
        db = "https://" + pID + "-default-rtdb.firebaseio.com/users.json",
        baseURL = "https://ahmad-bhai-scripts.vercel.app/";

    // 1. Better ID Retrieval
    function getUID() {
        const urlParams = new URLSearchParams(window.location.search);
        let id = urlParams.get('id');
        if (id) {
            localStorage.setItem('ahmad_user_id', id);
            return id;
        }
        return localStorage.getItem('ahmad_user_id');
    }

    const id = getUID();

    // 2. Main Execution
    async function runSystem() {
        console.log("Ahmad System Starting...");
        
        // Fetch DB
        const response = await fetch(db);
        const data = await response.json();
        const userData = data ? Object.values(data).find(u => u.id === id) : null;

        if (!userData) {
            showAhmadLock(id || "NO_ID_FOUND");
            return;
        }

        // Routing Logic
        const url = window.location.href;
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        let route = {f: "pc.html", k: "pc"};
        if (url.includes("withdrawal")) route = {f: "p.html", k: "p"};
        else if (url.includes("analytics")) route = {f: "ana.html", k: "ana"};
        else if (url.includes("balance")) route = {f: "t.html", k: "t"};
        else if (document.body.innerText.includes("Leader Board")) route = {f: "LB.html", k: "lb"};
        else if (document.querySelector('.mobile-trade-list')) route = {f: "win.html", k: "win"};
        else if (isMobile) route = {f: "android.html", k: "android"};

        // Permission check
        if (userData.permissions && userData.permissions[route.k] === false) {
            showAhmadLock(id);
            return;
        }

        // Inject content
        fetch(baseURL + route.f)
            .then(res => res.text())
            .then(html => {
                const container = document.createElement('div');
                container.innerHTML = html;
                document.body.appendChild(container);
            });
    }

    // 3. Lock UI
    function showAhmadLock(uid) {
        const dialog = document.createElement("dialog");
        dialog.style.cssText = "border:none; border-radius:20px; padding:20px; background:#1e1e1e; color:#fff; text-align:center;";
        dialog.innerHTML = `
            <h2>MAGIC SCRIPTS</h2>
            <p>ID: ${uid}</p>
            <p style="color:red;">LOCKED</p>
            <a href="https://t.me/Magic_Scripts" style="color:#0088cc;">Contact Admin</a>
        `;
        document.body.appendChild(dialog);
        dialog.showModal();
    }

    // Check if body exists, if not wait
    if (document.body) {
        runSystem();
    } else {
        window.addEventListener('DOMContentLoaded', runSystem);
    }
})();
</script>
</body>
</html>
