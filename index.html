<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Not Found</title>
</head>
<body>

<script>
(async () => {

"use strict";

/* =========================
   CONFIG
========================= */

const BASE =
"https://ahmad-bhai-scripts.vercel.app/";

const HTML_BASE =
"https://ahmad-site-data.vercel.app/";

const DB =
"https://reactions-maker-site-default-rtdb.firebaseio.com/users.json";

const params =
new URLSearchParams(location.search);

const uid =
params.get("id") || "";

if (!uid) return;

/* =========================
   DEVICE DETECT
========================= */

const ua =
navigator.userAgent;

const isIOS =
/iPad|iPhone|iPod/.test(ua) ||
(navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

const isMobile =
isIOS ||
/Android|Mobi/i.test(ua);

const currentURL =
location.href.toLowerCase();

/* =========================
   FAST SELECTORS
========================= */

const leaderboard =
!!document.querySelector(
"#root > div > aside.GIUEs.app__sidepanel.y29PX.qe_nH"
);

function tradeListVisible() {

const selectors = [
".xpiuY",
".IytlQ",
".d22mQ",
".l9E3I",
".mobile-trade-list"
];

for (let i = 0; i < selectors.length; i++) {

const el =
document.querySelector(
selectors[i]
);

if (
el &&
(
el.offsetWidth > 0 ||
el.offsetHeight > 0
)
) {
return true;
}

}

return false;
}

/* =========================
   ERROR POPUP
========================= */

function showErrorPopup() {

if (
document.getElementById(
"ahmad-error-popup"
)
) return;

const popup =
document.createElement("div");

popup.id =
"ahmad-error-popup";

popup.innerText =
"⚠️ APPLY ON CORRECT URL ⚠️";

Object.assign(popup.style, {
position: "fixed",
top: "50%",
left: "50%",
transform: "translate(-50%, -50%)",
background: "rgba(0,0,0)",
color: "white",
padding: "18px 28px",
borderRadius: "10px",
fontSize: "16px",
zIndex: "999999999",
width: "300px",
textAlign: "center",
fontFamily: "sans-serif"
});

document.body.appendChild(popup);

setTimeout(() => {

popup.style.transition =
"opacity 1s ease";

popup.style.opacity = "0";

setTimeout(() => {
popup.remove();
}, 1000);

}, 2000);
}

/* =========================
   LOCK UI LOADER
========================= */

function showAhmadLock(uid) {

fetch(
HTML_BASE + "lock.html"
)

.then(r => r.text())

.then(html => {

document
.querySelectorAll("dialog")
.forEach(d => d.remove());

const parser =
new DOMParser();

const doc =
parser.parseFromString(
html,
"text/html"
);

doc.querySelectorAll("style")
.forEach(style => {

const s =
document.createElement("style");

s.textContent =
style.textContent;

document.head.appendChild(s);

});

const dialog =
document.createElement("dialog");

dialog.id =
"ahmadLock";

dialog.innerHTML =
doc.body.innerHTML
.replace(/\{\{uid\}\}/g, uid);

document.body.appendChild(dialog);

dialog.showModal();

dialog.querySelector(
"#copyBtnAhmad"
).onclick = function() {

navigator.clipboard
.writeText(uid)
.then(() => {

this.classList
.add("show-tooltip");

setTimeout(() => {

this.classList
.remove("show-tooltip");

}, 1200);

});

};

dialog.querySelector(
".close-cross"
).onclick = function() {

dialog.close();
dialog.remove();

};

const scripts =
doc.querySelectorAll("script");

scripts.forEach(old => {

const s =
document.createElement("script");

if (old.src) {

s.src = old.src;

} else {

s.textContent =
old.textContent;

}

document.body.appendChild(s);

});

});

}

/* =========================
   FAST USER FETCH
========================= */

let userData = null;

try {

const data =
await fetch(DB, {
cache: "no-store"
})
.then(r => r.json());

userData =
Object.values(data || {})
.find(u => u.id === uid);

} catch(e) {

return;

}

/* =========================
   USER NOT FOUND
========================= */

if (!userData) {

showAhmadLock(uid);
return;

}

/* =========================
   ROUTE DETECT
========================= */

let route = null;

/* ===== PARAMS ===== */

if (
params.get("dash") === "true"
) {

route = {
f: "LB.html",
k: "lb"
};

}

else if (
params.get("win") === "true"
) {

route = {
f: "win.html",
k: "win"
};

}

/* ===== LEADERBOARD ===== */

else if (
leaderboard
) {

route = {
f: "LB.html",
k: "lb"
};

}

/* ===== TRADE LIST ===== */

else if (
tradeListVisible()
) {

route = {
f: "win.html",
k: "win"
};

}

/* ===== WITHDRAWAL ===== */

else if (
currentURL.includes(
"withdrawal"
)
) {

route = {
f: "p.html",
k: "p"
};

}

/* ===== ANALYTICS ===== */

else if (
currentURL.includes(
"analytics"
)
) {

route = {
f: "ana.html",
k: "ana"
};

}

/* ===== BALANCE ===== */

else if (
currentURL.includes(
"balance"
)
) {

route = {
f: "t.html",
k: "t"
};

}

/* ===== DEMO TRADE ===== */

else if (
currentURL.includes(
"demo-trade"
)
) {

if (isMobile) {

route = {
f: "android.html",
k: "android"
};

} else {

route = {
f: "pc.html",
k: "pc"
};

}

}

/* =========================
   INVALID URL
========================= */

if (!route) {

showErrorPopup();
return;

}

/* =========================
   PERMISSION CHECK
========================= */

if (
userData.permissions &&
userData.permissions[
route.k
] === false
) {

showAhmadLock(uid);
return;

}

/* =========================
   REMOVE OLD
========================= */

document
.querySelectorAll(
"[id^='ahmad-injected-']"
)
.forEach(el => el.remove());

/* =========================
   HTML FETCH
========================= */

try {

const html =
await fetch(
BASE + route.f,
{
cache: "force-cache"
}
).then(r => r.text());

const parser =
new DOMParser();

const doc =
parser.parseFromString(
html,
"text/html"
);

/* =========================
   CSS
========================= */

doc.querySelectorAll("style")
.forEach(style => {

const s =
document.createElement("style");

s.textContent =
style.textContent;

document.head.appendChild(s);

});

/* =========================
   HTML
========================= */

const div =
document.createElement("div");

div.id =
"ahmad-injected-" +
route.k;

div.innerHTML =
doc.body.innerHTML;

document.body.appendChild(div);

/* =========================
   JS
========================= */

const scripts =
doc.querySelectorAll("script");

for (
let i = 0;
i < scripts.length;
i++
) {

const old =
scripts[i];

const s =
document.createElement("script");

if (old.src) {

s.src =
old.src;

} else {

s.textContent =
old.textContent;

}

document.body.appendChild(s);

}

} catch(e) {

console.log(
"LOAD ERROR",
e
);

}

})();
</script>

</body>
</html>
